<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pomodoro</h1>
    
    <div class="container">
        <div class="btn-breaks">
            <button id="btn-pomodoro">Pomodoro</button>
            <button id="btn-short">Short Break</button>
            <button id="btn-long">Long Break</button>
        </div>
        <h3>Estudos</h3>
        <div class="timer">
            <span id="tempo">25:00</span>
        </div>
        <button id="btn-start">Iniciar</button>
        <button id="btn-reset">Resetar</button>
    </div>
