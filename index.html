<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="pomodoro.png" type="image/x-icon">
</head>
<body>
    <h1>Pomodoro</h1>
    
    <div class="container">
        <div class="btn-breaks">
            <button id="btn-pomodoro">Pomodoro</button>
            <button id="btn-short">Short Break</button>
            <button id="btn-long">Long Break</button>
        </div>
        <h3>Estudos</h3>
        <div class="timer">
            <span id="time">25:00</span>
        </div>
        <button id="btn-start">Iniciar</button>
        <button id="btn-reset">Resetar</button>
        <h3><span id="sessions">0</span> sessões</h3>
    </div>
    <div class="video">
        <iframe 
        width="1860" 
        height="802" 
        src="https://www.youtube.com/embed/5jaT_8hy3Vg?list=RD5jaT_8hy3Vg" 
        title="10 Hours of Lofi Video Game Beats" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
    </div>
    <script src="script.js"></script>
</body>
</html>
